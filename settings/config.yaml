model_config:
   defaults:
      model_name: TinyLlama/TinyLlama-1.1B-Chat-v1.0 # alternatives: "openai-community/gpt2-medium", "distilgpt2", "gpt2-large", "TinyLlama/TinyLlama-1.1B-Chat-v1.0", "Qwen/Qwen2.5-0.5B"
      device: "auto" # "auto" detects MPS (Apple Silicon), CUDA, or CPU. Override with "cpu", "cuda", or "mps" to pin a device.
      max_length: 20
      temperature: 0.5
      top_k: 8
      top_p: 0.9
      repetition_penalty: 1.2
      num_return_sequences: 1

logging_config:
   defaults:
      log_level: "DEBUG"
      log_file: "logs/app.log"